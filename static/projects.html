<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目列表 - 投标引擎</title>
    <link rel="stylesheet" href="notion-style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <a href="/" class="navbar-brand">🎯 投标引擎</a>
            <div style="display: flex; gap: 24px; align-items: center;">
                <a href="/" style="color: var(--notion-text-primary); text-decoration: none;">首页</a>
                <a href="/projects" style="color: var(--notion-accent-blue); text-decoration: none; font-weight: 500;">项目列表</a>
                <a href="/bid" style="color: var(--notion-text-primary); text-decoration: none;">标书生成</a>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section style="background: linear-gradient(135deg, #2383E4 0%, #1A5FB4 100%); color: white; padding: 48px 24px;">
        <div style="max-width: 1200px; margin: 0 auto;">
            <h1 style="font-size: 2rem; font-weight: 600; font-family: var(--notion-font-serif); margin-bottom: 8px;">招标项目列表</h1>
            <p style="opacity: 0.9;">实时数据来自中国政府采购网 + 国家电网</p>
        </div>
    </section>

    <!-- 搜索和筛选 -->
    <section style="padding: 32px 24px;">
        <div style="max-width: 1200px; margin: 0 auto;">
            <div class="card">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <input type="text" id="searchInput" placeholder="搜索项目名称..." class="input">
                    <select id="categorySelect" class="input">
                        <option value="">所有行业</option>
                        <option value="政府采购">政府采购</option>
                        <option value="电力招标">电力招标</option>
                    </select>
                    <button onclick="loadProjects()" class="btn btn-primary">搜索</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 项目列表 -->
    <section style="padding-bottom: 80px;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 24px;">
            <div id="projectsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px;">
                <!-- 项目卡片由 JavaScript 动态加载 -->
            </div>
            <div id="loading" style="text-align: center; padding: 48px;">
                <div style="width: 48px; height: 48px; border: 3px solid var(--notion-border); border-top-color: var(--notion-accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
                <p style="margin-top: 16px; color: var(--notion-text-secondary);">加载中...</p>
            </div>
        </div>
    </section>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script>
        const API_BASE = 'https://tender-engine-backend-production.up.railway.app';

        async function loadProjects() {
            const loading = document.getElementById('loading');
            const grid = document.getElementById('projectsGrid');
            
            loading.style.display = 'block';
            grid.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/api/projects`);
                const projects = await response.json();

                loading.style.display = 'none';

                if (projects.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: var(--notion-text-secondary);">暂无数据</p>';
                    return;
                }

                projects.forEach(project => {
                    const card = document.createElement('a');
                    card.className = 'project-item';
                    card.href = `/project-detail?id=${project.id}`;
                    card.innerHTML = `
                        <div>
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
                                <span class="badge">${project.category}</span>
                                <span style="font-size: 13px; color: var(--notion-text-tertiary);">${project.deadline} 截止</span>
                            </div>
                            <h3 class="project-title">${project.name}</h3>
                            <p style="font-size: 14px; color: var(--notion-text-secondary); margin-bottom: 16px;">${project.description.substring(0, 80)}...</p>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                                <span style="color: var(--notion-accent-blue); font-weight: 600;">￥${(project.budget / 10000).toFixed(0)}万</span>
                                <span style="font-size: 13px; color: var(--notion-text-tertiary);">📍 ${project.location}</span>
                            </div>
                            <div style="display: flex; align-items: justify-between; padding-top: 16px; border-top: 1px solid var(--notion-border);">
                                <span style="font-size: 12px; color: var(--notion-text-tertiary);">${project.source_site}</span>
                                <span style="color: var(--notion-accent-blue); font-weight: 500;">查看详情 →</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                loading.innerHTML = `<p style="color: var(--notion-accent-red);">加载失败：${error.message}</p>`;
            }
        }

        // 页面加载时获取数据
        loadProjects();
    </script>
</body>
</html>
