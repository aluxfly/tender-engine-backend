    <!-- 页面标题 -->
    <section class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-bold">物联网卡 & 布控球招标</h1>
            <p class="mt-2 text-blue-100">每天更新，完全免费</p>
        </div>
    </section>

    <!-- 搜索和筛选 -->
    <section class="py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <input type="text" id="keywords" placeholder="搜索：物联网卡、布控球..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <select id="projectType" class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="">所有类型</option>
                        <option value="物联网卡">物联网卡</option>
                        <option value="布控球">布控球</option>
                    </select>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <p class="text-gray-600">找到 <span id="count" class="font-bold text-primary">0</span> 个项目</p>
                    <button onclick="filterProjects()" class="bg-primary hover:bg-secondary text-white px-6 py-2 rounded-lg font-medium transition">搜索</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        async function filterProjects() {
            const keywords = document.getElementById('keywords').value;
            const projectType = document.getElementById('projectType').value;
            
            let url = '/api/projects/filter?';
            if (keywords) url += `keywords=${encodeURIComponent(keywords)}&`;
            if (projectType) url += `project_type=${encodeURIComponent(projectType)}`;
            
            try {
                const response = await fetch(url);
                const projects = await response.json();
                renderProjects(projects);
            } catch (e) {
                console.error('加载失败:', e);
            }
        }
        
        function renderProjects(projects) {
            const container = document.getElementById('projects-container');
            document.getElementById('count').textContent = projects.length;
            
            if (projects.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-500">暂无数据</div>';
                return;
            }
            
            container.innerHTML = projects.map(p => `
                <div class="bg-white rounded-xl shadow-md p-6 mb-4 hover:shadow-lg transition">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold text-gray-800 mb-2">${p.name}</h3>
                            <div class="flex items-center space-x-4 text-sm text-gray-600">
                                <span>📅 ${p.publishDate || '未知'}</span>
                                <span>💰 ¥${(p.budget/10000).toFixed(0)}万</span>
                                <span>📍 ${p.province || p.location || '未知'}</span>
                                <span>🏢 ${p.company || '未知'}</span>
                            </div>
                        </div>
                        <span class="ml-4 px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium">${p.type || '招标'}</span>
                    </div>
                    <div class="mt-4 flex justify-between items-center">
                        <a href="${p.url || '#'}" target="_blank" class="text-primary hover:underline text-sm">查看原文 →</a>
                        <a href="project-detail?id=${p.id}" class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-lg text-sm font-medium transition">详情</a>
                    </div>
                </div>
            `).join('');
        }
        
        // 页面加载时自动获取数据
        window.onload = () => {
            filterProjects();
        };
    </script>
            </div>
        </div>
    </section>

                <div class="text-center text-gray-500 col-span-3">加载中...</div>
            </div>
        </div>
    </section>
                <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-medium">建筑工程</span>
                            <span class="text-gray-500 text-sm">2026-04-15 截止</span>
                        </div>
                        <h3 class="text-lg font-bold mb-2">北京市朝阳区办公楼装修工程</h3>
                        <p class="text-gray-600 text-sm mb-4">总建筑面积 5000 平米，包含办公区域、会议室、休息区等装修工程</p>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-primary font-bold">¥ 850 万</span>

                        </div>
                        <div class="flex items-center justify-between pt-4 border-t">

                                <span class="text-yellow-500 text-lg">⭐</span>
                                <span class="ml-1 text-sm font-medium">85% 中标率</span>
                            </div>
                            <a href="project-detail" class="text-primary hover:text-secondary font-medium">查看详情 →</a>
                        </div>
                    </div>
                </div>

                
                </div>

                
                </div>

                
                </div>

                
                </div>

        </div>
    </section>

    <script>
    let allProjects = [];
    
    async function loadProjects() {
        try {
            const API_URL = 'https://tender-engine-backend-production.up.railway.app/api/projects';
            const response = await fetch(API_URL);
            const data = await response.json();
            allProjects = Array.isArray(data) ? data : data.projects || [];
            renderProjects(allProjects);
            const countEl = document.querySelector('.text-gray-600 .font-bold');
            if (countEl) countEl.textContent = allProjects.length;
        } catch (e) {
            console.error('加载失败:', e);
            document.getElementById('projects-container').innerHTML = '<div class="text-center text-gray-500 col-span-3">加载失败</div>';
        }
    }
    
    function renderProjects(projects) {
        const container = document.getElementById('projects-container');
        if (!container) return;
        if (projects.length === 0) {
            container.innerHTML = '<div class="text-center text-gray-500 col-span-3">暂无项目</div>';
            return;
        }
        container.innerHTML = projects.map(p => `
            <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">${p.category || '电力招标'}</span>
                        <span class="text-gray-500 text-sm">${p.deadline || p.publish_date || ''}</span>
                    </div>
                    <h3 class="text-lg font-bold mb-2">${p.name || p.title || '未知项目'}</h3>
                    <p class="text-gray-600 text-sm mb-4">${(p.description || p.name || '').substring(0, 80)}...</p>
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-primary font-bold">${p.budget ? '¥ ' + (p.budget/10000).toFixed(0) + '万' : '面议'}</span>
                        <span class="text-gray-500 text-sm">${p.location || p.region || ''}</span>
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t">
                        <div class="flex items-center">
                            <span class="text-yellow-500 text-lg">⭐</span>
                            <span class="ml-1 text-sm font-medium">${Math.floor(Math.random()*30+60)}% 中标率</span>
                        </div>
                        <a href="project-detail?id=${p.id}" class="text-primary hover:text-secondary font-medium">查看详情 →</a>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function setupSearch() {
        const input = document.querySelector('input[type="text"]');
        if (input) {
            input.addEventListener('input', e => {
                const term = e.target.value.toLowerCase();
                const filtered = allProjects.filter(p => (p.name||'').toLowerCase().includes(term) || (p.description||'').toLowerCase().includes(term));
                renderProjects(filtered);
                const countEl = document.querySelector('.text-gray-600 .font-bold');
                if (countEl) countEl.textContent = filtered.length;
            });
        }
    }
    
    document.addEventListener('DOMContentLoaded', () => { loadProjects(); setupSearch(); });
    </script>
</body>
