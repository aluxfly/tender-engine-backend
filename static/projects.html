<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目列表 - 投标引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#1E40AF',
                    }
                }
            }
        }
    </script>
    <style>
        /* 卡片淡入动画 */
        .project-card {
            opacity: 0;
            animation: cardFadeIn 0.5s ease-out forwards;
        }
        
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 骨架屏动画 */
        .skeleton-line {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
            border-radius: 8px;
        }
        
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* 日期筛选按钮 */
        .date-filter-btn {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            background: white;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .date-filter-btn:hover {
            border-color: #3B82F6;
            color: #3B82F6;
        }
        
        .date-filter-btn.active {
            border-color: #3B82F6;
            background: #EFF6FF;
            color: #3B82F6;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold text-primary">🎯 投标引擎</a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/" class="text-gray-700 hover:text-primary font-medium">首页</a>
                    <a href="/projects" class="text-primary font-medium">项目列表</a>
                    <a href="/bid" class="text-gray-700 hover:text-primary font-medium">标书生成</a>
                    <button class="bg-primary hover:bg-secondary text-white px-6 py-2 rounded-lg font-medium transition">立即试用</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-bold">项目列表</h1>
            <p class="mt-2 text-blue-100">浏览最新招标项目，发现投标机会</p>
        </div>
    </section>

    <!-- 搜索和筛选 -->
    <section class="py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <!-- 第一行：关键词搜索 -->
                <div class="flex gap-4 flex-wrap items-center mb-4">
                    <div class="flex-1 min-w-[280px] relative">
                        <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">🔍</span>
                        <input type="text" id="searchInput" placeholder="搜索项目名称、地点、关键词..." 
                            class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <select id="categorySelect" class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary min-w-[160px]">
                        <option value="">📦 所有行业</option>
                        <option value="电力设备">⚡ 电力设备</option>
                        <option value="政府采购">🏛️ 政府采购</option>
                    </select>
                    <button onclick="loadProjects()" class="bg-primary hover:bg-secondary text-white px-6 py-3 rounded-lg font-medium transition">
                        🔍 搜索
                    </button>
                </div>
                
                <!-- 第二行：时间筛选 -->
                <div class="flex gap-4 flex-wrap items-center pt-4 border-t border-gray-200">
                    <span class="text-sm text-gray-500 font-medium">📅 时间：</span>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="setDateFilter('today')" class="date-filter-btn" id="dateToday">今天</button>
                        <button onclick="setDateFilter('week')" class="date-filter-btn" id="dateWeek">近7天</button>
                        <button onclick="setDateFilter('month')" class="date-filter-btn" id="dateMonth">近30天</button>
                        <button onclick="setDateFilter('all')" class="date-filter-btn active" id="dateAll">全部</button>
                    </div>
                    <div class="ml-auto flex gap-2 items-center">
                        <span class="text-xs text-gray-500">自定义</span>
                        <input type="date" id="dateStart" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                        <span class="text-gray-400">~</span>
                        <input type="date" id="dateEnd" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 项目列表 -->
    <section class="pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- 统计信息 -->
            <div id="statsBar" class="flex justify-between items-center my-4 p-4 bg-white rounded-xl shadow">
                <div class="flex items-center gap-2">
                    <span class="text-lg">📊</span>
                    <span id="projectCount" class="text-gray-700 font-semibold">共找到 0 个项目</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-gray-500">
                    <span>🕐</span>
                    <span>更新时间：<span id="updateTime">--</span></span>
                </div>
            </div>
            
            <!-- 骨架屏（初始加载） -->
            <div id="skeletonGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="skeleton-line h-6 w-24 mb-4"></div>
                    <div class="skeleton-line h-5 w-full mb-3"></div>
                    <div class="skeleton-line h-4 w-3/4 mb-4"></div>
                    <div class="skeleton-line h-8 w-32"></div>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="skeleton-line h-6 w-24 mb-4"></div>
                    <div class="skeleton-line h-5 w-full mb-3"></div>
                    <div class="skeleton-line h-4 w-3/4 mb-4"></div>
                    <div class="skeleton-line h-8 w-32"></div>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="skeleton-line h-6 w-24 mb-4"></div>
                    <div class="skeleton-line h-5 w-full mb-3"></div>
                    <div class="skeleton-line h-4 w-3/4 mb-4"></div>
                    <div class="skeleton-line h-8 w-32"></div>
                </div>
            </div>
            
            <!-- 项目网格 -->
            <div id="projectsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" style="display: none;">
                <!-- 项目卡片由 JavaScript 动态加载 -->
            </div>
            
            <!-- 加载状态 -->
            <div id="loading" class="text-center py-20" style="display: none;">
                <div class="inline-flex flex-col items-center gap-4">
                    <div class="w-14 h-14 border-4 border-gray-300 border-t-primary rounded-full animate-spin"></div>
                    <p class="text-gray-600 font-medium">正在加载项目数据...</p>
                </div>
            </div>
            
            <!-- 空状态 -->
            <div id="emptyState" class="text-center py-20" style="display: none;">
                <div class="text-5xl mb-4 opacity-50">📭</div>
                <p class="text-gray-600">暂无匹配的项目数据</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-gray-800 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400">&copy; 2026 投标引擎。All rights reserved.</p>
        </div>
    </footer>

    <script>
        const API_BASE = 'https://tender-engine-backend-production.up.railway.app';
        let currentDateFilter = 'all';

        // 设置日期筛选
        function setDateFilter(filter) {
            currentDateFilter = filter;
            
            // 更新按钮样式
            document.querySelectorAll('.date-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            const activeBtn = document.getElementById('date' + filter.charAt(0).toUpperCase() + filter.slice(1));
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
            
            // 清空自定义日期
            if (filter !== 'custom') {
                document.getElementById('dateStart').value = '';
                document.getElementById('dateEnd').value = '';
            }
            
            loadProjects();
        }

        // 获取日期范围
        function getDateRange() {
            const today = new Date();
            const formatDate = (d) => d.toISOString().split('T')[0];
            
            switch(currentDateFilter) {
                case 'today':
                    return { start: formatDate(today), end: formatDate(today) };
                case 'week':
                    const weekAgo = new Date(today);
                    weekAgo.setDate(weekAgo.getDate() - 7);
                    return { start: formatDate(weekAgo), end: formatDate(today) };
                case 'month':
                    const monthAgo = new Date(today);
                    monthAgo.setDate(monthAgo.getDate() - 30);
                    return { start: formatDate(monthAgo), end: formatDate(today) };
                case 'custom':
                    const start = document.getElementById('dateStart').value;
                    const end = document.getElementById('dateEnd').value;
                    return { start, end };
                default:
                    return { start: null, end: null };
            }
        }

        async function loadProjects() {
            const skeletonGrid = document.getElementById('skeletonGrid');
            const loading = document.getElementById('loading');
            const grid = document.getElementById('projectsGrid');
            const emptyState = document.getElementById('emptyState');
            const searchInput = document.getElementById('searchInput');
            const categorySelect = document.getElementById('categorySelect');
            
            // 显示加载状态
            skeletonGrid.style.display = 'none';
            loading.style.display = 'block';
            grid.style.display = 'none';
            emptyState.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/projects?limit=500`);
                let projects = await response.json();

                // 应用搜索和筛选
                const searchTerm = searchInput.value.toLowerCase();
                const category = categorySelect.value;
                const dateRange = getDateRange();
                
                if (searchTerm) {
                    projects = projects.filter(p => 
                        p.name.toLowerCase().includes(searchTerm) ||
                        p.location.toLowerCase().includes(searchTerm) ||
                        p.description.toLowerCase().includes(searchTerm)
                    );
                }
                
                if (category) {
                    projects = projects.filter(p => p.category === category);
                }
                
                // 时间筛选
                if (dateRange.start && dateRange.end) {
                    projects = projects.filter(p => {
                        if (!p.publish_date) return false;
                        return p.publish_date >= dateRange.start && p.publish_date <= dateRange.end;
                    });
                }

                loading.style.display = 'none';

                // 更新统计信息
                document.getElementById('projectCount').textContent = `共找到 ${projects.length} 个项目`;
                
                // 使用最新项目的发布日期作为更新时间
                if (projects.length > 0) {
                    const latestProject = projects.reduce((latest, p) => {
                        return (!latest.publish_date || (p.publish_date && p.publish_date > latest.publish_date)) ? p : latest;
                    }, projects[0]);
                    document.getElementById('updateTime').textContent = latestProject.publish_date || '--';
                } else {
                    document.getElementById('updateTime').textContent = '--';
                }
                document.getElementById('statsBar').style.display = 'flex';

                if (projects.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                grid.style.display = 'grid';
                grid.innerHTML = '';

                projects.forEach((project, index) => {
                    const card = document.createElement('a');
                    card.className = 'project-card bg-white rounded-xl shadow-lg p-6 border border-gray-200 hover:shadow-xl hover:border-primary transition-all duration-300 cursor-pointer block';
                    card.href = `/project-detail?id=${project.id}`;
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    const categoryBg = project.category === '电力招标' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700';
                    const categoryIcon = project.category === '电力招标' ? '⚡' : '🏛️';
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4 gap-3">
                            <span class="px-3 py-1 rounded-full text-xs font-semibold ${categoryBg}">${categoryIcon} ${project.category}</span>
                            <span class="px-3 py-1 rounded-full text-xs bg-gray-100 text-gray-600">📅 ${project.publish_date}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3 text-gray-800 line-clamp-2">${project.name}</h3>
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-yellow-50 text-yellow-800 px-3 py-1 rounded-full text-sm font-bold">💰 ¥${(project.budget / 10000).toFixed(0)}万</span>
                            <span class="text-sm text-gray-500">📍 ${project.location}</span>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-gray-200">
                            <div class="flex items-center gap-2">
                                <span class="text-xs px-2 py-1 rounded-full font-medium ${project.source && project.source.includes('电工交易专区') ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}">
                                    📌 ${project.source || '国家电网电子商务平台'}
                                </span>
                            </div>
                            <span class="text-primary font-semibold text-sm hover:underline">查看详情 →</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                loading.style.display = 'none';
                skeletonGrid.style.display = 'none';
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <div class="text-5xl mb-4">⚠️</div>
                        <p class="text-red-600 font-medium">加载失败：${error.message}</p>
                        <button onclick="loadProjects()" class="mt-4 bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium transition">重试</button>
                    </div>
                `;
                grid.style.display = 'grid';
            }
        }

        // 搜索输入回车触发
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadProjects();
            }
        });

        // 分类选择变化触发
        document.getElementById('categorySelect').addEventListener('change', function() {
            loadProjects();
        });

        // 自定义日期选择触发
        document.getElementById('dateStart').addEventListener('change', function() {
            currentDateFilter = 'custom';
            if (document.getElementById('dateEnd').value) {
                loadProjects();
            }
        });
        
        document.getElementById('dateEnd').addEventListener('change', function() {
            currentDateFilter = 'custom';
            if (document.getElementById('dateStart').value) {
                loadProjects();
            }
        });

        // 页面加载时获取数据
        loadProjects();
    </script>
</body>
</html>
