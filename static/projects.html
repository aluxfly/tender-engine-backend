<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招标项目 - 物联网招标助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <a href="index.html" class="text-2xl font-bold text-primary">📡 物联网招标助手</a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-primary font-medium">首页</a>
                    <a href="projects" class="text-primary font-medium">项目列表</a>
                    <a href="bid.html" class="text-gray-700 hover:text-primary font-medium">标书生成</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h1 class="text-3xl font-bold">物联网卡 & 布控球招标</h1>
            <p class="mt-2 text-blue-100">每天更新，完全免费</p>
        </div>
    </section>

    <section class="py-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="grid md:grid-cols-3 gap-4">
                    <input type="text" id="keywords" placeholder="搜索：物联网卡、布控球..." class="md:col-span-2 px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    <select id="projectType" class="px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="">所有类型</option>
                        <option value="物联网卡">物联网卡</option>
                        <option value="布控球">布控球</option>
                    </select>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <p class="text-gray-600">找到 <span id="count" class="font-bold text-primary">0</span> 个项目</p>
                    <button onclick="filterProjects()" class="bg-primary hover:bg-secondary text-white px-6 py-2 rounded-lg font-medium">搜索</button>
                </div>
            </div>
        </div>
    </section>

    <section class="pb-20">
        <div class="max-w-7xl mx-auto px-4">
            <div id="projects-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="text-center text-gray-500 col-span-3">加载中...</div>
            </div>
        </div>
    </section>

    <script>
        let allProjects = [];
        
        async function filterProjects() {
            const keywords = document.getElementById('keywords').value;
            const projectType = document.getElementById('projectType').value;
            
            let url = '/api/projects/filter?';
            if (keywords) url += `keywords=${encodeURIComponent(keywords)}&`;
            if (projectType) url += `project_type=${encodeURIComponent(projectType)}`;
            
            try {
                const res = await fetch(url);
                const projects = await res.json();
                allProjects = projects;
                document.getElementById('count').textContent = projects.length;
                renderProjects(projects);
            } catch (e) {
                document.getElementById('projects-container').innerHTML = '<div class="text-center text-gray-500 col-span-3">加载失败</div>';
            }
        }
        
        function renderProjects(projects) {
            const container = document.getElementById('projects-container');
            if (projects.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 col-span-3">暂无项目</div>';
                return;
            }
            container.innerHTML = projects.map(p => `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">${p.type || '招标'}</span>
                            <span class="text-gray-500 text-sm">${p.publishDate || ''}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-2">${p.name}</h3>
                        <p class="text-gray-600 text-sm mb-4">${p.company}</p>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-primary font-bold">¥ ${(p.budget/10000).toFixed(0)}万</span>
                            <span class="text-gray-500 text-sm">${p.province || ''}</span>
                        </div>
                        <div class="flex items-center justify-between pt-4 border-t">
                            <a href="${p.url}" target="_blank" class="text-primary hover:underline text-sm">查看原文 →</a>
                            <a href="project-detail?id=${p.id}" class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-lg text-sm font-medium">详情</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        window.onload = () => {
            filterProjects();
        };
    </script>
</body>
</html>
