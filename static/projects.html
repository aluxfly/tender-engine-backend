<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目列表 - 投标引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#1E40AF',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold text-primary">🎯 投标引擎</a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/" class="text-gray-700 hover:text-primary font-medium">首页</a>
                    <a href="/projects" class="text-primary font-medium">项目列表</a>
                    <a href="/bid" class="text-gray-700 hover:text-primary font-medium">标书生成</a>
                    <button class="bg-primary hover:bg-secondary text-white px-6 py-2 rounded-lg font-medium transition">立即试用</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-bold">招标项目列表</h1>
            <p class="mt-2 text-blue-100">发现最适合您的招标机会</p>
        </div>
    </section>

    <!-- 搜索和筛选 -->
    <section class="py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="grid md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <input type="text" placeholder="搜索项目名称、关键词..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <select class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="">所有行业</option>
                        <option value="construction">建筑工程</option>
                        <option value="it">信息技术</option>
                        <option value="service">服务采购</option>
                        <option value="goods">货物采购</option>
                    </select>
                    <select class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        <option value="">所有地区</option>
                        <option value="beijing">北京</option>
                        <option value="shanghai">上海</option>
                        <option value="guangzhou">广州</option>
                        <option value="shenzhen">深圳</option>
                    </select>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <p class="text-gray-600">找到 <span class="font-bold text-primary">24</span> 个项目</p>
                    <button class="bg-primary hover:bg-secondary text-white px-6 py-2 rounded-lg font-medium transition">搜索</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 项目列表 -->
    <section class="pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="projects-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="text-center text-gray-500 col-span-3">加载中...</div>
            </div>
        </div>
    </section>

    <!-- 分页 -->
    <div class="mt-12 flex justify-center">
        <nav class="flex space-x-2">
            <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100">上一页</button>
            <button class="px-4 py-2 bg-primary text-white rounded-lg">1</button>
            <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100">2</button>
            <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100">3</button>
            <button class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100">下一页</button>
        </nav>
    </div>

    <!-- 页脚 -->
    <footer class="bg-gray-800 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400">&copy; 2026 投标引擎。All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
