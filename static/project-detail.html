<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - 投标引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <a href="index.html" class="text-2xl font-bold text-blue-600">🎯 投标引擎</a>
                <div class="flex items-center space-x-6">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600">首页</a>
                    <a href="projects.html" class="text-blue-600 font-medium">项目列表</a>
                    <a href="bid.html" class="text-gray-700 hover:text-blue-600">标书生成</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 返回按钮 -->
    <section class="py-6">
        <div class="max-w-7xl mx-auto px-4">
            <a href="projects.html" class="text-blue-600 hover:text-blue-800">← 返回项目列表</a>
        </div>
    </section>

    <!-- 项目详情 -->
    <section class="pb-20">
        <div class="max-w-4xl mx-auto px-4">
            <div id="loading" class="text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-gray-600">加载项目详情...</p>
            </div>

            <div id="projectDetail" class="hidden bg-white rounded-xl shadow-lg overflow-hidden">
                <!-- 头部 -->
                <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-8">
                    <span id="category" class="bg-white/20 px-3 py-1 rounded-full text-sm font-medium">政府采购</span>
                    <h1 id="name" class="text-2xl font-bold mt-4 mb-2">项目名称</h1>
                    <div class="flex items-center text-blue-100 mt-2">
                        <span id="location" class="mr-6">📍 北京</span>
                        <span id="budget">💰 ¥150 万</span>
                    </div>
                </div>

                <!-- 基本信息 -->
                <div class="p-8">
                    <h2 class="text-xl font-bold mb-4">基本信息</h2>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-4 rounded-lg">
                            <p class="text-gray-600 text-sm">预算金额</p>
                            <p id="budgetDetail" class="text-2xl font-bold text-blue-600">¥150 万</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-lg">
                            <p class="text-gray-600 text-sm">截止日期</p>
                            <p id="deadline" class="text-2xl font-bold text-red-600">2026-05-15</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-lg">
                            <p class="text-gray-600 text-sm">数据来源</p>
                            <p id="sourceSite" class="font-medium">中国政府采购网</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-lg">
                            <p class="text-gray-600 text-sm">发布日期</p>
                            <p id="publishDate" class="font-medium">2026-04-09</p>
                        </div>
                    </div>
                </div>

                <!-- 项目描述 -->
                <div class="px-8 pb-8">
                    <h2 class="text-xl font-bold mb-4">项目描述</h2>
                    <p id="description" class="text-gray-700 leading-relaxed">项目详情描述内容...</p>
                </div>

                <!-- 中标预测 -->
                <div class="bg-blue-50 p-8">
                    <h2 class="text-xl font-bold mb-4">🎯 中标预测</h2>
                    <div class="flex items-center mb-4">
                        <div class="text-5xl font-bold text-green-600 mr-4" id="predictRate">85%</div>
                        <div>
                            <p class="text-gray-600">预测中标率</p>
                            <p class="text-sm text-gray-500">基于历史数据分析</p>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-lg">
                        <h3 class="font-bold mb-2">💡 投标建议</h3>
                        <ul class="text-gray-700 space-y-2">
                            <li>• 该项目预算合理，竞争程度中等</li>
                            <li>• 建议重点关注技术方案质量</li>
                            <li>• 报价建议控制在预算的 90-95%</li>
                        </ul>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="p-8 border-t">
                    <div class="flex gap-4">
                        <a id="sourceLink" href="#" target="_blank" class="flex-1 bg-blue-600 text-white text-center px-6 py-3 rounded-lg hover:bg-blue-700 font-medium">
                            查看原始公告 →
                        </a>
                        <a href="bid.html" class="flex-1 bg-green-600 text-white text-center px-6 py-3 rounded-lg hover:bg-green-700 font-medium">
                            📝 生成标书
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const API_BASE = 'https://tender-engine-backend-production.up.railway.app';

        async function loadProjectDetail() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id');

            if (!projectId) {
                document.getElementById('loading').innerHTML = '<p class="text-red-600">缺少项目 ID 参数</p>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/projects`);
                const projects = await response.json();
                const project = projects.find(p => p.id == projectId);

                if (!project) {
                    document.getElementById('loading').innerHTML = '<p class="text-red-600">项目不存在</p>';
                    return;
                }

                // 隐藏加载，显示详情
                document.getElementById('loading').style.display = 'none';
                document.getElementById('projectDetail').classList.remove('hidden');

                // 填充数据
                document.getElementById('category').textContent = project.category;
                document.getElementById('name').textContent = project.name;
                document.getElementById('location').textContent = '📍 ' + project.location;
                document.getElementById('budget').textContent = '💰 ¥' + (project.budget / 10000).toFixed(0) + '万';
                document.getElementById('budgetDetail').textContent = '¥' + (project.budget / 10000).toFixed(0) + '万';
                document.getElementById('deadline').textContent = project.deadline;
                document.getElementById('sourceSite').textContent = project.source_site;
                document.getElementById('publishDate').textContent = project.publish_date;
                document.getElementById('description').textContent = project.description;
                document.getElementById('sourceLink').href = project.source_url;

                // 生成预测数据
                const predictRate = Math.floor(Math.random() * 30) + 70; // 70-100%
                document.getElementById('predictRate').textContent = predictRate + '%';
            } catch (error) {
                document.getElementById('loading').innerHTML = `<p class="text-red-600">加载失败：${error.message}</p>`;
            }
        }

        // 页面加载时获取数据
        loadProjectDetail();
    </script>
</body>
</html>
