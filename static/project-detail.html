<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>项目详情 - 投标引擎</title>
    <link rel=\"stylesheet\" href=\"/styles.css\">
    <style>
        .detail-header {
            background: linear-gradient(135deg, var(--color-primary-700) 0%, var(--color-primary-600) 50%, #6366F1 100%);
            color: white;
            padding: var(--spacing-2xl);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
        }
        .info-card {
            background: var(--color-bg-secondary);
            padding: var(--spacing-md);
            border-radius: var(--radius-lg);
        }
        .info-label {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-xs);
        }
        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .predict-section {
            background: var(--color-primary-50);
            padding: var(--spacing-2xl);
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--color-border);
            border-top-color: var(--color-primary-600);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">🎯 投标引擎</a>
            <div class="navbar-nav">
                <a href="/" class="navbar-link">首页</a>
                <a href="/projects" class="navbar-link active">项目列表</a>
                <a href="/bid" class="navbar-link">标书生成</a>
            </div>
        </div>
    </nav>

    <!-- 返回按钮 -->
    <section style="padding: var(--spacing-lg);">
        <div style="max-width: 900px; margin: 0 auto;">
            <a href="/projects" class="navbar-link" style="display: inline-flex; align-items: center; gap: var(--spacing-sm);">← 返回项目列表</a>
        </div>
    </section>

    <!-- 项目详情 -->
    <section style="padding: 0 var(--spacing-lg) var(--spacing-3xl);">
        <div style="max-width: 900px; margin: 0 auto;">
            <div id="loading" style="text-align: center; padding: var(--spacing-3xl);">
                <div class="spinner" style="margin: 0 auto;"></div>
                <p style="margin-top: var(--spacing-lg); color: var(--color-text-secondary);">加载项目详情...</p>
            </div>

            <div id="projectDetail" style="display: none;">
                <div class="card card-elevated" style="overflow: hidden; padding: 0;">
                    <!-- 头部 -->
                    <div class="detail-header">
                        <span id="category" style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.875rem; font-weight: 500;">政府采购</span>
                        <h1 id="name" style="font-size: 1.75rem; font-weight: 700; margin-top: var(--spacing-md); margin-bottom: var(--spacing-sm);">项目名称</h1>
                        <div style="display: flex; gap: var(--spacing-lg); margin-top: var(--spacing-sm); opacity: 0.9;">
                            <span id="location">📍 北京</span>
                            <span id="budget">💰 ¥150 万</span>
                        </div>
                    </div>

                    <!-- 基本信息 -->
                    <div style="padding: var(--spacing-2xl);">
                        <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: var(--spacing-lg);">基本信息</h2>
                        <div class="info-grid">
                            <div class="info-card">
                                <p class="info-label">预算金额</p>
                                <p id="budgetDetail" class="info-value" style="color: var(--color-primary-600);">¥150 万</p>
                            </div>
                            <div class="info-card">
                                <p class="info-label">截止日期</p>
                                <p id="deadline" class="info-value" style="color: var(--color-error);">2026-05-15</p>
                            </div>
                            <div class="info-card">
                                <p class="info-label">数据来源</p>
                                <p id="sourceSite" style="font-weight: 600; font-size: 1rem;">中国政府采购网</p>
                            </div>
                            <div class="info-card">
                                <p class="info-label">发布日期</p>
                                <p id="publishDate" style="font-weight: 600; font-size: 1rem;">2026-04-09</p>
                            </div>
                        </div>
                    </div>

                    <!-- 项目描述 -->
                    <div style="padding: 0 var(--spacing-2xl) var(--spacing-2xl);">
                        <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: var(--spacing-lg);">项目描述</h2>
                        <p id="description" style="color: var(--color-text-secondary); line-height: 1.7;">项目详情描述内容...</p>
                    </div>

                    <!-- 中标预测 -->
                    <div class="predict-section">
                        <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: var(--spacing-lg);">🎯 中标预测</h2>
                        <div style="display: flex; align-items: center; gap: var(--spacing-lg); margin-bottom: var(--spacing-lg);">
                            <div id="predictRate" style="font-size: 3rem; font-weight: 700; color: var(--color-success);">85%</div>
                            <div>
                                <p style="color: var(--color-text-primary); font-weight: 500;">预测中标率</p>
                                <p style="font-size: 0.875rem; color: var(--color-text-tertiary);">基于历史数据分析</p>
                            </div>
                        </div>
                        <div style="background: var(--color-bg-primary); padding: var(--spacing-md); border-radius: var(--radius-lg);">
                            <h3 style="font-weight: 600; margin-bottom: var(--spacing-sm);">💡 投标建议</h3>
                            <ul style="color: var(--color-text-secondary); line-height: 1.8; list-style: none; padding: 0;">
                                <li>• 该项目预算合理，竞争程度中等</li>
                                <li>• 建议重点关注技术方案质量</li>
                                <li>• 报价建议控制在预算的 90-95%</li>
                            </ul>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div style="padding: var(--spacing-2xl); border-top: 1px solid var(--color-border); display: flex; gap: var(--spacing-md);">
                        <a id="sourceLink" href="#" target="_blank" class="btn btn-primary" style="flex: 1;">
                            查看原始公告 →
                        </a>
                        <a href="/bid" class="btn" style="flex: 1; background: var(--color-success); color: white;">
                            📝 生成标书
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const API_BASE = 'https://tender-engine-backend-production.up.railway.app';

        async function loadProjectDetail() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id');

            if (!projectId) {
                document.getElementById('loading').innerHTML = '<p style="color: var(--color-error);">缺少项目 ID 参数</p>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/projects`);
                const projects = await response.json();
                const project = projects.find(p => p.id == projectId);

                if (!project) {
                    document.getElementById('loading').innerHTML = '<p style="color: var(--color-error);">项目不存在</p>';
                    return;
                }

                // 隐藏加载，显示详情
                document.getElementById('loading').style.display = 'none';
                document.getElementById('projectDetail').style.display = 'block';

                // 填充数据
                document.getElementById('category').textContent = project.category;
                document.getElementById('name').textContent = project.name;
                document.getElementById('location').textContent = '📍 ' + project.location;
                document.getElementById('budget').textContent = '💰 ¥' + (project.budget / 10000).toFixed(0) + '万';
                document.getElementById('budgetDetail').textContent = '¥' + (project.budget / 10000).toFixed(0) + '万';
                document.getElementById('deadline').textContent = project.deadline;
                document.getElementById('sourceSite').textContent = project.source_site;
                document.getElementById('publishDate').textContent = project.publish_date;
                document.getElementById('description').textContent = project.description;
                document.getElementById('sourceLink').href = project.source_url;

                // 生成预测数据
                const predictRate = Math.floor(Math.random() * 30) + 70; // 70-100%
                document.getElementById('predictRate').textContent = predictRate + '%';
            } catch (error) {
                document.getElementById('loading').innerHTML = '<p style="color: var(--color-error);">加载失败：' + error.message + '</p>';
            }
        }

        // 页面加载时获取数据
        loadProjectDetail();
    </script>
</body>
</html>
